apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sjf-scheduler-ingress
  namespace: vllm-scheduler
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: scheduler.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sjf-scheduler-service
                port:
                  number: 8080
