apiVersion: v1
kind: ConfigMap
metadata:
  name: sjf-scheduler-config
  namespace: vllm-scheduler
data:
  scheduler.yaml: |
    scheduler:
      type: sjf
      max_workers: 32
      fallback_to_fcfs: true
    predictor:
      models_dir: /models
    vllm:
      base_url: http://vllm-service:8000
      model: HuggingFaceTB/SmolLM3-3B
    gateway:
      host: 0.0.0.0
      port: 8080
