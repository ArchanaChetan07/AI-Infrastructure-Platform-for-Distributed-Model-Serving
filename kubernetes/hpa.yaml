apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sjf-scheduler-hpa
  namespace: vllm-scheduler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sjf-scheduler
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: scheduler_queue_depth
        target:
          type: AverageValue
          averageValue: "50"
