[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = python .
addopts = -v --tb=short --strict-markers
markers =
    unit: fast unit tests, no GPU
    accuracy: output accuracy vs HuggingFace (needs GPU + HF_TOKEN)
    integration: full vLLM pipeline (needs GPU + HF_TOKEN)
    benchmark: throughput benchmarks (needs GPU + HF_TOKEN)
    smollm3: SmolLM3 model port tests
    asyncio: mark test as async (handled by pytest-asyncio)
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
