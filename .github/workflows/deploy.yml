name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: scheduler
            dockerfile: docker/Dockerfile.scheduler
          - name: gateway
            dockerfile: docker/Dockerfile.gateway
          - name: ml
            dockerfile: docker/Dockerfile.ml
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-smoke:
    runs-on: ubuntu-latest
    needs: build-and-publish
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published images
        run: |
          docker pull ${{ env.REGISTRY }}/${{ github.repository }}-scheduler:latest
          docker pull ${{ env.REGISTRY }}/${{ github.repository }}-gateway:latest
          docker pull ${{ env.REGISTRY }}/${{ github.repository }}-ml:latest

      - name: Validate compose configuration
        run: docker compose -f docker/docker-compose.scheduler.yml config

      - name: Deployment summary
        run: |
          {
            echo "## Deployment complete"
            echo ""
            echo "| Service | Image |"
            echo "|---------|-------|"
            echo "| scheduler | \`${{ env.REGISTRY }}/${{ github.repository }}-scheduler:latest\` |"
            echo "| gateway | \`${{ env.REGISTRY }}/${{ github.repository }}-gateway:latest\` |"
            echo "| ml | \`${{ env.REGISTRY }}/${{ github.repository }}-ml:latest\` |"
            echo ""
            echo "Environment: **${{ github.event.inputs.environment || 'staging' }}**"
          } >> "$GITHUB_STEP_SUMMARY"
