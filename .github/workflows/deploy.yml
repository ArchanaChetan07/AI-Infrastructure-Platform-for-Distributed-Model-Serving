name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: scheduler
            dockerfile: docker/Dockerfile.scheduler
          - name: gateway
            dockerfile: docker/Dockerfile.gateway
          - name: ml
            dockerfile: docker/Dockerfile.ml
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space for Docker builds
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image repository
        id: image
        shell: bash
        run: echo "repository=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}-${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-smoke:
    runs-on: ubuntu-latest
    needs: build-and-publish
    environment: ${{ github.event.inputs.environment || (startsWith(github.ref, 'refs/tags/') && 'production' || 'staging') }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image repository
        id: image
        shell: bash
        run: echo "repository=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Pull published images
        run: |
          docker pull ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}-scheduler:latest
          docker pull ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}-gateway:latest
          docker pull ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}-ml:latest

      - name: Validate compose configuration
        run: docker compose -f docker/docker-compose.scheduler.yml config

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "## Deployment complete"
            echo ""
            echo "| Service | Image |"
            echo "|---------|-------|"
            echo "| scheduler | \`${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}-scheduler:latest\` |"
            echo "| gateway | \`${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}-gateway:latest\` |"
            echo "| ml | \`${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}-ml:latest\` |"
            echo ""
            echo "Environment: **${{ github.event.inputs.environment || (startsWith(github.ref, 'refs/tags/') && 'production' || 'staging') }}**"
          } >> "$GITHUB_STEP_SUMMARY"
